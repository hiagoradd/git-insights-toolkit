name: pr-title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # The PR title becomes the squash-merge commit message, which release-please
      # parses to decide the next version. Enforce Conventional Commits on it.
      # feat -> minor, fix -> patch, feat!/BREAKING CHANGE -> major.
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
            test
            build
            ci
