name: version-guard

on:
  pull_request:
    paths:
      - '.claude-plugin/plugin.json'

permissions:
  contents: read

jobs:
  no-decrease:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Version must be valid semver and must not decrease
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          head_ver=$(jq -r '.version' .claude-plugin/plugin.json)
          base_ver=$(git show "$BASE_SHA:.claude-plugin/plugin.json" | jq -r '.version')

          semver_re='^[0-9]+\.[0-9]+\.[0-9]+([-+].*)?$'
          if ! [[ "$head_ver" =~ $semver_re ]]; then
            echo "::error::plugin.json version '$head_ver' is not valid semver."
            exit 1
          fi

          if [ "$base_ver" = "$head_ver" ]; then
            echo "Version unchanged ($head_ver) — OK. release-please owns bumps; contributors should not edit it."
            exit 0
          fi

          highest=$(printf '%s\n%s\n' "$base_ver" "$head_ver" | sort -V | tail -n1)
          if [ "$highest" != "$head_ver" ]; then
            echo "::error::plugin.json version decreased: $base_ver -> $head_ver."
            exit 1
          fi
          echo "Version increased: $base_ver -> $head_ver — OK."
